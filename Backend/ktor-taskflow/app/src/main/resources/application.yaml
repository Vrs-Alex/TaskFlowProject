ktor:
    application:
        modules:
            - vrsalex.app.ApplicationKt.module
    deployment:
        port: 8080
jwt:
  domain: "https://taskflow.ru"
  audience: "taskflow-user"
  realm: "TaskFlow user realm"
  secret: "${JWT_SECRET}"
  expiration: 2592000000
  refreshExpiration: 2592000000

db:
  user: ${DB_USER:user}
  password: ${DB_PASSWORD:password}
  db_name: ${DB_NAME:taskflow}
  port: ${DB_PORT:5432}
  host: ${DB_HOST:localhost}
  poolConnectionCount: 5
  poolConnectionMaxCount: 35
